<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bağlantı Hatası</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1318;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
    }
    .container { max-width: 440px; width: 100%; text-align: center; }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 24px;
      background: rgba(245, 158, 11, 0.1); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; color: #f59e0b; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; color: #f1f5f9; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 8px; }
    .retry-btn {
      margin-top: 24px; display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; background: #f59e0b; color: #0f1318; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .retry-btn:hover { background: #d97706; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>
    <h1>Bağlantı Hatası</h1>
    <p>Sunucuya ulaşılamıyor. İnternet bağlantınızı kontrol edip tekrar deneyin.</p>
    <button class="retry-btn" onclick="location.reload()">Tekrar Dene</button>
  </div>
</body>
</html>
