<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1318" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>Yatırım Platformu</title>
    <meta name="description" content="Güvenilir Yatırım Platformu">
    <link rel="icon" type="image/png" href="/app-icon.png">
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow" />
</head>
  <body style="background:#0f1318;margin:0;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;">
    <div id="root">
      <div id="app-loading" style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f1318;color:#94a3b8;font-family:system-ui,sans-serif;gap:16px;">
        <div style="width:32px;height:32px;border:3px solid #1e293b;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <p style="font-size:14px;">Yükleniyor...</p>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // If app doesn't load within 30s, show maintenance message
      setTimeout(function(){
        var root = document.getElementById('root');
        var loading = document.getElementById('app-loading');
        if(loading && root && root.children.length <= 1){
          loading.innerHTML = '<div style="text-align:center;max-width:400px;padding:24px;"><div style="width:56px;height:56px;margin:0 auto 20px;background:rgba(245,158,11,0.1);border-radius:14px;display:flex;align-items:center;justify-content:center;"><svg xmlns=\'http://www.w3.org/2000/svg\' width=\'28\' height=\'28\' fill=\'none\' viewBox=\'0 0 24 24\' stroke-width=\'1.5\' stroke=\'#f59e0b\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' d=\'M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z\'/></svg></div><h2 style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:10px;">Bağlantı Sağlanamadı</h2><p style="font-size:13px;color:#94a3b8;line-height:1.6;">Platform şu anda geçici olarak kullanılamıyor. Lütfen birkaç dakika sonra tekrar deneyin.</p><button onclick="location.reload()" style="margin-top:20px;padding:10px 28px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">Tekrar Dene</button></div>';
        }
      }, 30000);
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0;url=/maintenance.html">
    </noscript>
  </body>
</html>
